services:
  - type: web
    name: gramai-cloud
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: LEMONSQUEEZY_WEBHOOK_SECRET
        sync: false
      - key: LEMONSQUEEZY_PRO_VARIANT_ID
        sync: false
      - key: LEMONSQUEEZY_TEAM_VARIANT_ID
        sync: false
      - key: ADMIN_SECRET
        generateValue: true
